# Сборка прод-образов в облаке (GitHub Actions) и публикация в GHCR.
# Мини-сервер не собирает сам — Watchtower подхватывает новые образы из GHCR.
# Триггер: каждый push в main. Ручной запуск — через "Run workflow".
name: build-and-publish

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # GHCR требует lowercase; репозиторий SiarheyB/statstrade → siarheyb/statstrade
  APP_IMAGE: ghcr.io/siarheyb/statstrade-app
  COLLECTOR_IMAGE: ghcr.io/siarheyb/statstrade-collector

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Приложение (Next.js) ---
      - name: Build & push app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ github.sha }}
          # Google Sign-In (опционально): задайте секрет NEXT_PUBLIC_GOOGLE_CLIENT_ID
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Collector ---
      - name: Build & push collector
        uses: docker/build-push-action@v6
        with:
          context: ./collector
          file: ./collector/Dockerfile
          push: true
          tags: |
            ${{ env.COLLECTOR_IMAGE }}:latest
            ${{ env.COLLECTOR_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
