# Сборка прод-образов в облаке (GitHub Actions) и публикация в GHCR.
# Мини-сервер не собирает сам — Watchtower подхватывает новые образы из GHCR.
# Триггер: каждый push в main. Ручной запуск — через "Run workflow".
name: build-and-publish

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # GHCR требует lowercase; репозиторий SiarheyB/statstrade → siarheyb/statstrade
  APP_IMAGE: ghcr.io/siarheyb/statstrade-app
  COLLECTOR_IMAGE: ghcr.io/siarheyb/statstrade-collector

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run vitest (unit + component)
        run: npx vitest run

      - name: Run collector prune-check (unit)
        run: node collector/prune-check.mjs

      - name: Run collector prune integration test
        run: node collector/prune-integration.mjs
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Приложение (Next.js) ---
      - name: Build & push app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ github.sha }}
          # NEXT_PUBLIC_* вшиваются в бандл при сборке → передаём из секретов.
          # Google Sign-In и Turnstile (капча) — оба опциональны.
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Collector ---
      - name: Build & push collector
        uses: docker/build-push-action@v6
        with:
          context: ./collector
          file: ./collector/Dockerfile
          push: true
          tags: |
            ${{ env.COLLECTOR_IMAGE }}:latest
            ${{ env.COLLECTOR_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
