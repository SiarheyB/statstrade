# Входная прослойка перед app-контейнером. Смысл: когда приложение
# перезапускается (деплой watchtower, OOM-рестарт, миграции при старте),
# пользователи видят красивую страницу «технический перерыв» с автообновлением,
# а не голый 502 от туннеля. Funnel/туннель указывает на этот nginx.
#
# NB: при полном отключении сервера (света) эту страницу отдавать некому —
# для этого случая нужен внешний слой (Cloudflare), см. docs/SELF_HOSTING.md.

server {
    listen 80;

    # Имя app резолвим в момент запроса через DNS Docker'а (127.0.0.11), а не на
    # старте nginx: иначе nginx вообще не поднимется, пока app-контейнер лежит —
    # а нам нужно ровно наоборот (edge живёт, пока app перезапускается).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Технические страницы nginx — без доступа снаружи напрямую.
    location = /offline.html {
        root /usr/share/nginx/html;
        internal;
        add_header Cache-Control "no-store";
    }

    # Импорт отчётов — долгая операция (парсинг + запись тысяч сделок).
    # Увеличиваем таймаут до 5 минут, чтобы не получить 502/offline.html
    # при обработке большого файла.
    location /api/accounts/ {
        set $upstream http://app:3000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;

        # Импорт может быть долгим — 5 минут
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;

        # Ошибки САМОГО приложения (его 5xx-JSON) проходят как есть;
        # error_page срабатывает только на gateway-ошибки nginx —
        # когда app-контейнер недоступен/не отвечает.
        proxy_intercept_errors off;
        error_page 502 503 504 /offline.html;
    }

    location / {
        # Переменная заставляет nginx резолвить имя при каждом запросе (см.
        # resolver выше); URI при этом передаётся без изменений.
        set $upstream http://app:3000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;

        # Долгие ответы приложения (синк, тяжёлые агрегации) не обрубаем.
        proxy_read_timeout 75s;
        proxy_connect_timeout 5s;

        # Ошибки САМОГО приложения (его 5xx-JSON) проходят как есть;
        # error_page срабатывает только на gateway-ошибки nginx —
        # когда app-контейнер недоступен/не отвечает.
        proxy_intercept_errors off;
        error_page 502 503 504 /offline.html;
    }
}
