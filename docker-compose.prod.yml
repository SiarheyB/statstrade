# Прод-стек для самохостинга (мини-сервер J1900): БД + приложение + collector +
# авто-обновление образов. Образы собираются в CI и тянутся из GHCR.
#
# Запуск:   docker compose -f docker-compose.prod.yml up -d
# Логи:     docker compose -f docker-compose.prod.yml logs -f app
# Образы лежат в GHCR (lowercase owner): ghcr.io/siarheyb/statstrade-{app,collector}
services:
  db:
    image: postgres:16-alpine
    container_name: tradestats-db
    restart: unless-stopped
    # Слабый 4-ядерный сервер делят db+app+collector. Без ограничения одна
    # агрегация карты ордеров поднимала параллельные воркеры и выжирала все ядра
    # (db до ~550% CPU), подтормаживая коллектор и приложение. Ограничиваем число
    # параллельных воркеров на запрос, чтобы машина оставалась отзывчивой.
    command:
      - postgres
      - -c
      - max_parallel_workers_per_gather=1
      - -c
      - max_parallel_workers=2
    environment:
      POSTGRES_USER: tradestats
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tradestats}
      POSTGRES_DB: tradestats
    volumes:
      - tradestats_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradestats -d tradestats"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ghcr.io/siarheyb/statstrade-app:latest
    container_name: tradestats-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      # Внутри compose-сети БД доступна по имени сервиса `db`.
      # connection_limit/pool_timeout — больше пула Prisma и дольше ожидание
      # соединения: карта ордеров шлёт по нескольку тяжёлых SQL-агрегаций за
      # запрос, дефолтных 9 соединений не хватало (Timed out fetching a connection).
      DATABASE_URL: postgresql://tradestats:${POSTGRES_PASSWORD:-tradestats}@db:5432/tradestats?schema=public&connection_limit=20&pool_timeout=20
      # Авто-синхронизацию бирж «по времени» на сервере гоняет СИСТЕМНЫЙ крон
      # хоста (см. SELF_HOSTING.md — шаг про /api/cron/sync), поэтому встроенный
      # in-process планировщик выключен: иначе синхронизации дублировались бы.
      ENABLE_SCHEDULER: "false"
      # Внутри compose-сети collector доступен по имени сервиса. Переопределить
      # можно в .env. COLLECTOR_METRICS_TOKEN/ADMIN_EMAILS задаются в .env.
      COLLECTOR_URL: ${COLLECTOR_URL:-http://collector:8080}
    ports:
      # Слушаем только localhost — наружу выставляет туннель (Tailscale/Cloudflare).
      - "127.0.0.1:3000:3000"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  collector:
    image: ghcr.io/siarheyb/statstrade-collector:latest
    container_name: tradestats-collector
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tradestats:${POSTGRES_PASSWORD:-tradestats}@db:5432/tradestats?schema=public
      SYMBOLS: ${OB_SYMBOLS:-BTCUSDT,ETHUSDT}
      EXCHANGES: ${OB_EXCHANGES:-binance-futures,binance-spot}
      SNAPSHOT_MS: ${OB_SNAPSHOT_MS:-2000}
      DEPTH_PCT: ${OB_DEPTH_PCT:-0.02}
      NOISE_MIN_NOTIONAL: ${OB_NOISE_MIN_NOTIONAL:-50000}
      BIG_NOTIONAL: ${OB_BIG_NOTIONAL:-100000}
      RETENTION_DAYS: ${OB_RETENTION_DAYS:-14}
      PORT: 8080
      # Bearer-токен для защищённого GET /metrics — его опрашивает админ-панель
      # приложения (раздел «Карта ордеров»). Должен совпадать с COLLECTOR_METRICS_TOKEN
      # у сервиса app. Если пусто — /metrics закрыт (404), раздел работает на
      # агрегатах Postgres без live-статуса фидов.
      COLLECTOR_METRICS_TOKEN: ${COLLECTOR_METRICS_TOKEN:-}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Авто-деплой: следит за GHCR и подменяет образы app/collector на новые.
  watchtower:
    image: containrrr/watchtower
    container_name: tradestats-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Креды для приватного GHCR (создаются `docker login ghcr.io`).
      - ${HOME}/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_POLL_INTERVAL: "120"
      # Свежий Docker-демон требует API >= 1.40; без этого watchtower стучится
      # по устаревшей 1.25 и падает в цикл рестарта ("client version is too old").
      DOCKER_API_VERSION: "1.44"
    command: ["--label-enable", "--cleanup", "--interval", "120"]

volumes:
  tradestats_pg:
