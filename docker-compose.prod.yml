# Прод-стек для самохостинга (мини-сервер J1900): БД + приложение + collector +
# авто-обновление образов. Образы собираются в CI и тянутся из GHCR.
#
# Запуск:   docker compose -f docker-compose.prod.yml up -d
# Логи:     docker compose -f docker-compose.prod.yml logs -f app
# Образы лежат в GHCR (lowercase owner): ghcr.io/siarheyb/statstrade-{app,collector}
#
networks:
  tradestats:
    driver: bridge

services:
  db:
    image: postgres:16-alpine
    container_name: tradestats-db
    restart: unless-stopped
    # Лимиты памяти: на слабом боксе (8 ГБ, делят два прод-стека) без потолка один
    # процесс может утащить всю RAM в своп и подвесить машину (как случилось при
    # тяжёлом orderflow). mem_limit = жёсткий потолок: при превышении ядро убивает
    # процесс в контейнере, и docker его перезапускает (restart: unless-stopped) —
    # вместо фриза всей машины. У БД потолок щедрый: ей нужна память под агрегации
    # (rollup-бэкафилл) и кэш; при упоре ядро прибьёт лишь backend-соединение
    # (запрос упадёт, приложение переподключится), а не весь Postgres.
    mem_limit: 2560m
    mem_reservation: 1g
    # Слабый 4-ядерный сервер делят db+app+collector. Без ограничения одна
    # агрегация карты ордеров поднимала параллельные воркеры и выжирала все ядра
    # (db до ~550% CPU), подтормаживая коллектор и приложение. Ограничиваем число
    # параллельных воркеров на запрос, чтобы машина оставалась отзывчивой.
    #
    # Тюнинг памяти под mem_limit=2560m (дефолты alpine консервативны — 128MB
    # shared_buffers, 4MB work_mem). Значения умеренные, чтобы при connection_limit
    # пула (20) суммарный work_mem не выбил контейнер в OOM:
    #   shared_buffers       — кэш страниц БД (~20% потолка).
    #   effective_cache_size — подсказка планировщику, сколько всего под кэш (ОС+БД).
    #   work_mem             — на сортировку/хэш одного узла плана; ×соединения×узлы.
    #   maintenance_work_mem — VACUUM / CREATE INDEX.
    #   random_page_cost/io  — SSD: случайное чтение почти как последовательное →
    #                          планировщик охотнее берёт индексы.
    command:
      - postgres
      - -c
      - max_parallel_workers_per_gather=1
      - -c
      - max_parallel_workers=2
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
    environment:
      POSTGRES_USER: tradestats
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tradestats}
      POSTGRES_DB: tradestats
    volumes:
      - tradestats_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradestats -d tradestats"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tradestats

  app:
    image: ghcr.io/siarheyb/statstrade-app:latest
    container_name: tradestats-app
    restart: unless-stopped
    # Главный «виновник» прошлого OOM (next-server раздувался до ~6.6 ГБ на тяжёлом
    # orderflow). Жёсткий потолок 1.5 ГБ: нормальная работа укладывается в ~0.3–0.6 ГБ,
    # а runaway будет прибит и перезапущен, не уронив весь сервер.
    mem_limit: 1536m
    mem_reservation: 384m
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      # Внутри compose-сети БД доступна по имени сервиса `db`.
      # connection_limit/pool_timeout — больше пула Prisma и дольше ожидание
      # соединения: карта ордеров шлёт по несколько тяжёлых SQL-агрегаций за
      # запрос, дефолтных 9 соединений не хватало (Timed out fetching a connection).
      DATABASE_URL: postgresql://tradestats:${POSTGRES_PASSWORD:-tradestats}@db:5432/tradestats?schema=public&connection_limit=20&pool_timeout=20
      # Авто-синхронизацию бирж «по времени» на сервере гоняет СИСТЕМНЫй крон
      # хоста (см. SELF_HOSTING.md — шаг про /api/cron/sync), поэтому встроенный
      # in-process планировщик выключен: иначе синхронизации дублировались бы.
      ENABLE_SCHEDULER: "false"
      # Внутри compose-сети collector доступен по имени сервиса. Переопределить
      # можно в .env. COLLECTOR_METRICS_TOKEN/ADMIN_EMAILS задаются в .env.
      COLLECTOR_URL: ${COLLECTOR_URL:-http://collector:8080}
    # Порт наружу НЕ публикуем: вход через edge (nginx ниже). Так во время
    # рестартов app (деплой watchtower, OOM) туннель получает красивую страницу
    # «технический перерыв», а не голый 502.
    expose:
      - "3000"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - tradestats

  # Входная прослойка: туннель (Tailscale Funnel / cloudflared) указывает на
  # 127.0.0.1:3000 как и раньше — только теперь это nginx, а не app. Когда app
  # недоступен, nginx отдаёт deploy/nginx/offline.html с автообновлением.
  # Конфиг и страница монтируются из репозитория: правка = git pull + up -d.
  edge:
    image: nginx:1.27-alpine
    container_name: tradestats-edge
    restart: unless-stopped
    mem_limit: 64m
    mem_reservation: 16m
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/offline.html:/usr/share/nginx/html/offline.html:ro
    ports:
      # Слушаем только localhost — наружу выставляет туннель (Tailscale/Cloudflare).
      - "127.0.0.1:3000:80"
    networks:
      - tradestats

  collector:
    image: ghcr.io/siarheyb/statstrade-collector:latest
    container_name: tradestats-collector
    restart: unless-stopped
    # Лёгкий long-running процесс (стаканы + минутный rollup-накопитель в памяти).
    # Реальное потребление ~0.1–0.2 ГБ; потолок с запасом.
    mem_limit: 512m
    mem_reservation: 128m
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tradestats:${POSTGRES_PASSWORD:-tradestats}@db:5432/tradestats?schema=public
      SYMBOLS: ${OB_SYMBOLS:-BTCUSDT,ETHUSDT}
      EXCHANGES: ${OB_EXCHANGES:-binance-futures,binance-spot}
      SNAPSHOT_MS: ${OB_SNAPSHOT_MS:-2000}
      DEPTH_PCT: ${OB_DEPTH_PCT:-0.02}
      NOISE_MIN_NOTIONAL: ${OB_NOISE_MIN_NOTIONAL:-50000}
      BIG_NOTIONAL: ${OB_BIG_NOTIONAL:-100000}
      RETENTION_DAYS: ${OB_RETENTION_DAYS:-14}
      PORT: 8080
      # Bearer-токен для защищённого GET /metrics — его опрашивает админ-панель
      # приложения (раздел «Карта ордеров»). Должен совпадать с COLLECTOR_METRICS_TOKEN
      # у сервиса app. Если пусто — /metrics закрыт (404), раздел работает на
      # агрегатах Postgres без live-статуса фидов.
      COLLECTOR_METRICS_TOKEN: ${COLLECTOR_METRICS_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - tradestats

  # Авто-деплой: следит за GHCR и подменяет образы app/collector на новые.
  watchtower:
    image: containrrr/watchtower
    container_name: tradestats-watchtower
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Креды для приватного GHCR (создаются `docker login ghcr.io`).
      - ${HOME}/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_POLL_INTERVAL: "120"
      # Свежий Docker-демон требует API >= 1.40; без этого watchtower стучится
      # по устаревшей 1.25 и падает в цикл рестарта ("client version is too old").
      DOCKER_API_VERSION: "1.44"
    command: ["--label-enable", "--cleanup", "--interval", "120"]
    networks:
      - tradestats

volumes:
  tradestats_pg: