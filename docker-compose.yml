# Local PostgreSQL for development (and a reference for production).
# Dev:   docker compose up -d db
# Prod:  use a managed Postgres or this service behind your own backups.
#
networks:
  tradestats:
    driver: bridge

services:
  db:
    image: postgres:16-alpine
    container_name: tradestats-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tradestats
      POSTGRES_PASSWORD: tradestats
      POSTGRES_DB: tradestats
    ports:
      - "5432:5432"
    volumes:
      - tradestats_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradestats -d tradestats"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - tradestats

  # Orderbook-heatmap collector. Постоянный сбор стаканов/сделок в БД.
  # Запуск (после применения миграций приложением):  docker compose up -d collector
  # Для долгого локального сбора — restart: unless-stopped переживёт перезагрузки.
  collector:
    build: ./collector
    container_name: tradestats-collector
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tradestats:tradestats@db:5432/tradestats
      SYMBOLS: ${OB_SYMBOLS:-BTCUSDT,ETHUSDT}
      EXCHANGES: ${OB_EXCHANGES:-binance-futures,binance-spot}
      SNAPSHOT_MS: ${OB_SNAPSHOT_MS:-2000}
      DEPTH_PCT: ${OB_DEPTH_PCT:-0.02}
      NOISE_MIN_NOTIONAL: ${OB_NOISE_MIN_NOTIONAL:-50000}
      BIG_NOTIONAL: ${OB_BIG_NOTIONAL:-100000}
      RETENTION_DAYS: ${OB_RETENTION_DAYS:-14}
      TRADE_RETENTION_DAYS: ${OB_TRADE_RETENTION_DAYS:-30}
	      CANDLE_RETENTION_DAYS: ${OB_CANDLE_RETENTION_DAYS:-365}
      PORT: 8080
      # Токен защиты /metrics — должен совпадать с COLLECTOR_METRICS_TOKEN в .env
      # приложения (раздел «Карта ордеров» в админке).
      COLLECTOR_METRICS_TOKEN: ${COLLECTOR_METRICS_TOKEN:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - tradestats

volumes:
  tradestats_pg: